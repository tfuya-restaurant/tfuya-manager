<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5ede3;--card:#fdf8f3;--border:#e8d8c8;

  --text:#4a3728;--text-light:#8a6e5a;--muted:#c9b5a5;
  --green:#5a8f6a;--green-bg:#e8f5ec;

body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",serif;color:var(--text);min-height:100vh;padding-bottom:74px}
#header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
#header h1{font-size:18px;color:var(--accent-dark);letter-spacing:.5px}
#header p{font-size:11px;color:var(--text-light);margin-top:2px}
#sync-status{font-size:10px;padding:3px 8px;border-radius:10px;white-space:nowrap}
.sync-ok{background:var(--green-bg);color:var(--green)}
.sync-err{background:var(--red-bg);color:var(--red)}
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;padding:9px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:9.5px;font-family:inherit}
.nav-btn.active{color:var(--accent-dark);font-weight:700}
.nav-icon{font-size:18px}
.page{padding:14px 14px 0;display:none}
.page.active{display:block}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--accent-dark);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr}
.kpi{background:var(--bg);border-radius:9px;padding:10px 8px;text-align:center}
.kpi-val{font-size:16px;font-weight:700;color:var(--accent-dark);line-height:1.2;word-break:break-word}
.kpi-label{font-size:10px;color:var(--text-light);margin-top:3px}
.stat-cell{text-align:center;padding:10px 6px}
.stat-val{font-size:14px;font-weight:700;color:var(--accent-dark)}
.stat-sub{font-size:10px;color:var(--text-light);margin-top:2px}
label{font-size:11px;color:var(--text-light);margin-bottom:3px;display:block}
input,select,textarea{width:100%;background:var(--white);border:1px solid var(--border);border-radius:7px;padding:8px 9px;font-size:13px;color:var(--text);font-family:inherit;outline:none;appearance:none;-webkit-appearance:none}
.row{display:flex;gap:8px;margin-bottom:8px}.col{flex:1}.col-2{flex:2}
.btn{border-radius:7px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;border:none}
.btn-primary{background:var(--accent);color:#fff}.btn-ghost{background:var(--white);color:var(--accent-dark);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}.btn-sm{padding:4px 10px;font-size:12px}.btn-full{width:100%}
.btn-icon{background:none;border:none;cursor:pointer;padding:2px 4px;font-size:16px}
.tabs{display:flex;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.tab-btn{flex:1;padding:9px 4px;background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text-light)}
.tab-btn.active{background:var(--accent);color:#fff;font-weight:700}
.list-item{padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.list-item:last-child{border-bottom:none}
.item-main{font-size:13px;font-weight:600}.item-sub{font-size:11px;color:var(--text-light);margin-top:2px}
.item-note{font-size:11px;color:var(--accent);margin-top:1px}.item-amount{font-size:14px;font-weight:700;color:var(--accent-dark);white-space:nowrap}
.item-actions{display:flex;align-items:center;gap:6px}
.badge{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;display:inline-block}
.badge-green{background:var(--green-bg);color:var(--green)}.badge-red{background:var(--red-bg);color:var(--red)}.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.profit-box{border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.profit-pos{background:var(--green-bg)}.profit-neg{background:var(--red-bg)}
.profit-label{font-size:13px;font-weight:700}.profit-val-pos{font-size:15px;font-weight:700;color:var(--green)}.profit-val-neg{font-size:15px;font-weight:700;color:var(--red)}
.bar-wrap{background:var(--border);border-radius:4px;height:5px;overflow:hidden;margin:5px 0}.bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.divider{border-bottom:1px solid var(--border);margin:10px 0}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(74,55,40,.4);z-index:200;align-items:flex-end}
#modal-overlay.open{display:flex}
#modal-box{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:700;color:var(--accent-dark)}
.modal-close{background:none;border:none;font-size:22px;color:var(--text-light);cursor:pointer;padding:2px 6px}
.month-bar{display:flex;gap:8px;align-items:center}.month-bar select{width:auto}
.empty{color:var(--muted);text-align:center;padding:24px 0;font-size:13px}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:12px;color:var(--text-light);font-size:14px}
.export-bar{display:flex;gap:8px;margin-top:10px}
.export-bar .btn{flex:1;font-size:12px;padding:7px 8px}
@media(max-width:360px){.kpi-val{font-size:14px}.stat-val{font-size:13px}}
</style>

</head>

const fmt=n=>{const x=Number(n);return isNaN(x)?"0":x.toLocaleString("zh-TW")};
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};
const thisYear=()=>new Date().getFullYear();
const thisMonth=()=>new Date().getMonth()+1;
const mkKey=(y,m)=>`${y}-${String(m).padStart(2,"0")}`;
const MONTHS=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

function makeYearOptions(selId,selected){
  const sel=document.getElementById(selId); if(!sel)return;
  sel.innerHTML="";
  for(let y=thisYear()+1;y>=thisYear()-4;y--){const o=document.createElement("option");o.value=y;o.textContent=y+"年";sel.appendChild(o)}
  sel.value=selected||thisYear();
}
function makeMonthOptions(selId,selected){
  const sel=document.getElementById(selId); if(!sel)return;
  sel.innerHTML="";
  MONTHS.forEach((m,i)=>{const o=document.createElement("option");o.value=i+1;o.textContent=m;sel.appendChild(o)});
  sel.value=selected||thisMonth();
}
function buildSelectors(){
  ["ov","sl","ex","py"].forEach(p=>{makeYearOptions(p+"-year");makeMonthOptions(p+"-month")});
  makeYearOptions("rp-year");makeYearOptions("rp-year2");makeYearOptions("rp-cmp1");makeYearOptions("rp-cmp2",thisYear()-1);
}
function showApp(){
  document.getElementById("loading").style.display="none";
  document.getElementById("header").style.display="block";
  document.getElementById("app").style.display="block";
  document.getElementById("nav").style.display="flex";
}
function setSync(text,ok=true){
  const el=document.getElementById("sync-status"); if(!el)return;
  el.textContent=text; el.className=ok?"sync-ok":"sync-err";
}

function connectFirebase(config){
  try{
    if(!firebase.apps.length) firebase.initializeApp(config);
    db=firebase.database();
    db.ref("tfuya").on("value",snap=>{
      const val=snap.val();
      if(val){ DATA={sales:{},expenses:{},payroll:{},...val}; }
      else{ DATA=JSON.parse(JSON.stringify(PRELOAD)); db.ref("tfuya").set(DATA); }
      renderAll(); setSync("● 已同步",true);
    },err=>{setSync("● 讀取失敗",false); alert("Firebase 讀取失敗："+err.message)});
    db.ref(".info/connected").on("value",s=>setSync(s.val()?"● 已同步":"● 離線",!!s.val()));
  }catch(e){setSync("● 連線失敗",false); alert("Firebase 連線失敗："+e.message)}
}
function saveData(){
  if(!db)return;
  db.ref("tfuya").set(DATA).then(()=>setSync("● 已同步",true)).catch(e=>{setSync("● 儲存失敗",false); alert("儲存失敗："+e.message)});
}

window.addEventListener("load",()=>{buildSelectors();showApp();connectFirebase(FIREBASE_CONFIG)});

window.switchPage=function(name,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderAll();
};

let currentReportTab="monthly";

  currentReportTab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");
  document.getElementById("report-monthly").style.display=tab==="monthly"?"block":"none";

  document.getElementById("report-compare").style.display=tab==="compare"?"block":"none";

};

function renderAll(){renderOverview();renderSales();renderExpenses();renderPayroll();renderReports()}

window.renderOverview=function(){
  const y=Number(document.getElementById("ov-year").value),m=Number(document.getElementById("ov-month").value),mk=mkKey(y,m);
  document.getElementById("ov-title").textContent=y+"年"+m+"月 · 營運概況";

  const totalGuests=salesRecs.reduce((a,[,r])=>a+(+r.guests||0),0);
  const workDays=[...new Set(salesRecs.map(([k])=>k.split("_")[0]))].length;
  const avgPer=totalGuests>0?Math.round(totalRev/totalGuests):0;
  const avgDay=workDays>0?Math.round(totalRev/workDays):0;
  const expRecs=DATA.expenses?.[mk]||[];
  const foodCost=expRecs.reduce((a,r)=>a+(+r.food||0),0);
  const laborCost=expRecs.reduce((a,r)=>a+(+r.labor||0),0);
  const otherCost=expRecs.reduce((a,r)=>a+(+r.other||0),0);
  const payrollTotal=(DATA.payroll?.[mk]||[]).reduce((a,p)=>a+(+p.netPay||0),0);
  const totalCost=foodCost+laborCost+otherCost+payrollTotal;
  const profit=totalRev-totalCost;
  const foodRatio=totalRev>0?(foodCost/totalRev*100).toFixed(1):0;
  const laborRatio=totalRev>0?((laborCost+payrollTotal)/totalRev*100).toFixed(1):0;
  const netMargin=totalRev>0?(profit/totalRev*100).toFixed(1):0;

  document.getElementById("ov-kpis").innerHTML=[
    ["NT$"+fmt(totalRev),"💰 營業收入"],[fmt(totalGuests)+" 人","👥 總客數"],["NT$"+fmt(avgPer),"🍽 平均客單價"],[workDays+" 天","📅 工作天數"]
  ].map(([v,l])=>`<div class="kpi"><div class="kpi-val">${v}</div><div class="kpi-label">${l}</div></div>`).join("");

  const workDays=[...new Set(sr.map(([k])=>k.split("_")[0]))].length,cost=food+labor+other+pay;

}

// 欄位值含逗號或換行時要加引號
function escapeCSV(val){
  const s=String(val==null?"":val);
  return s.includes(",")||s.includes("\n")||s.includes('"')?`"${s.replace(/"/g,'""')}"`:s;
}

// 下載單一 CSV（含 BOM，Excel 中文不亂碼）
function downloadCSV(rows,filename){
  const csv=rows.map(r=>r.map(escapeCSV).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=filename;
  link.click();
  showExportHint();
}

function showExportHint(){
  const el=document.getElementById("export-hint");
  el.style.display="block";
  setTimeout(()=>el.style.display="none",2500);
}

    const isEdit=mode==="payroll-edit",p=isEdit?(DATA.payroll?.[editPayrollKey]||[])[editPayrollIdx]:null;
    title.textContent=isEdit?"編輯員工薪資":"新增員工薪資";
    body.innerHTML=`<div style="margin-bottom:8px"><label>員工姓名</label><input id="m-name" value="${p?p.name:""}"></div><div class="row"><div class="col"><label>月薪本薪</label><input type="number" id="m-base" value="${p?p.baseSalary:30300}"></div><div class="col"><label>加班時數</label><input type="number" step="0.5" id="m-ot" value="${p&&p.overtimeHours?p.overtimeHours:""}"></div></div><div class="row"><div class="col"><label>加班費率（元/時）</label><input type="number" id="m-otrate" value="${p?p.overtimeRate:196}"></div><div class="col"><label>獎金</label><input type="number" id="m-bonus" value="${p&&p.bonus?p.bonus:""}"></div></div><div class="row"><div class="col"><label>扣款</label><input type="number" id="m-ded" value="${p&&p.deduction?p.deduction:""}"></div><div class="col"><label>勞健保自付</label><input type="number" id="m-ins" value="${p?p.laborInsurance:1063}"></div></div><button class="btn btn-primary btn-full" style="margin-top:4px" onclick="savePayroll()">儲存</button>`;
  }
};
window.editPayroll=function(mk,i){editPayrollKey=mk;editPayrollIdx=i;openModal("payroll-edit")};
window.closeModal=function(){document.getElementById("modal-overlay").classList.remove("open")};
window.closeModalOutside=function(e){if(e.target.id==="modal-overlay")closeModal()};

window.saveSale=function(){
  const dining=+document.getElementById("m-dining").value||0,souvenir=+document.getElementById("m-souvenir").value||0;
  if(!dining&&!souvenir){alert("請輸入至少一項收入金額");return}
  const date=document.getElementById("m-date").value,key=date+"_"+Date.now();
  if(!DATA.sales)DATA.sales={};
  DATA.sales[key]={date,guests:+document.getElementById("m-guests").value||0,tables:document.getElementById("m-tables").value,dining,souvenir,note:document.getElementById("m-note").value};
  saveData();closeModal();renderAll();
};
window.saveExpense=function(){
  const food=+document.getElementById("m-food").value||0,labor=+document.getElementById("m-labor").value||0,other=+document.getElementById("m-other").value||0;
  if(!food&&!labor&&!other){alert("請輸入至少一項金額");return}
  const date=document.getElementById("m-date").value;
  const mk=date.slice(0,7);
  if(!DATA.expenses)DATA.expenses={}; if(!DATA.expenses[mk])DATA.expenses[mk]=[];
  DATA.expenses[mk].push({id:Date.now(),date,vendor:document.getElementById("m-vendor").value,item:document.getElementById("m-item").value,food,labor,other,payment:document.getElementById("m-pay").value});
  const [yy,mm]=mk.split("-"); document.getElementById("ex-year").value=yy; document.getElementById("ex-month").value=Number(mm);
  saveData();closeModal();renderAll();
};
window.savePayroll=function(){
  const name=document.getElementById("m-name").value.trim(); if(!name){alert("請輸入員工姓名");return}
  const base=+document.getElementById("m-base").value||0,ot=+document.getElementById("m-ot").value||0,otRate=+document.getElementById("m-otrate").value||196,bonus=+document.getElementById("m-bonus").value||0,ded=+document.getElementById("m-ded").value||0,ins=+document.getElementById("m-ins").value||1063;
  const otPay=Math.round(ot*otRate),gross=base+otPay+bonus-ded,net=gross-ins;
  const entry={name,baseSalary:base,overtimeHours:ot,overtimeRate:otRate,overtimePay:otPay,bonus,deduction:ded,laborInsurance:ins,grossPay:gross,netPay:net};
  const y=Number(document.getElementById("py-year").value),mo=Number(document.getElementById("py-month").value),mk=mkKey(y,mo);
  if(!DATA.payroll)DATA.payroll={}; if(!DATA.payroll[mk])DATA.payroll[mk]=[];
  if(modalMode==="payroll-edit"&&editPayrollIdx>=0)DATA.payroll[editPayrollKey][editPayrollIdx]=entry; else DATA.payroll[mk].push(entry);
  saveData();closeModal();renderAll();
};
</script>
