<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特富野餐廳 · 營運管理 PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:-apple-system;background:#f5ede3;margin:0;padding:10px}
.card{background:#fff;padding:12px;border-radius:10px;margin-bottom:10px}
.btn{padding:8px;border:none;border-radius:6px;background:#c4956a;color:#fff;width:100%}
</style>
</head>

<body>

<h2>特富野餐廳 PRO 系統</h2>

<div class="card">
  <h3>⚡ 快速紀錄</h3>
  <button class="btn" onclick="quickAdd('文健站',1200)">文健站 +1200</button><br><br>
  <button class="btn" onclick="quickAddGuests('民宿',400)">民宿</button><br><br>
  <button class="btn" onclick="quickAddGuests('活動',600)">活動</button>
</div>

<div class="card">
  <h3>➕ 新增營收</h3>
  <input id="date" type="date"><br><br>
  <input id="amount" type="number" placeholder="金額"><br><br>

  <select id="type">
    <option>散客</option>
    <option>民宿</option>
    <option>文健站</option>
    <option>活動</option>
    <option>BOC</option>
  </select><br><br>

  <button class="btn" onclick="save()">儲存</button>
</div>

<div class="card">
  <h3>📊 今日營運</h3>
  <div id="today"></div>
  <button class="btn" onclick="copyReport()">複製日結</button>
</div>

<div class="card">
  <h3>📈 客群分析</h3>
  <div id="analysis"></div>
</div>

<div class="card">
  <h3>📋 記錄</h3>
  <div id="list"></div>
</div>

<script>
const config={
  apiKey:"AIzaSyBX7locnv67MlyH_lVdMriJjyuMvt_uRQo",
  databaseURL:"https://tfuya-restaurant-default-rtdb.firebaseio.com",
  projectId:"tfuya-restaurant"
};

firebase.initializeApp(config);
const db=firebase.database();

function todayStr(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}

function save(){
  const d=document.getElementById("date").value;
  const a=document.getElementById("amount").value;
  const t=document.getElementById("type").value;

  db.ref("sales").push({
    date:d,
    amount:Number(a),
    type:t,
    guests:0
  });
}

function quickAdd(type,amount){
  db.ref("sales").push({
    date:todayStr(),
    amount,
    type,
    guests:0
  });
}

function quickAddGuests(type,price){
  const g=prompt("人數");
  if(!g)return;

  db.ref("sales").push({
    date:todayStr(),
    amount:g*price,
    type,
    guests:Number(g)
  });
}

let todayText="";

function render(){
  db.ref("sales").on("value",snap=>{
    let html="";
    let todayRev=0;
    let todayGuests=0;
    let typeMap={};

    snap.forEach(c=>{
      const v=c.val();
      html+=`<div>${v.date} ${v.type} NT$${v.amount}</div>`;

      if(v.date===todayStr()){
        todayRev+=v.amount;
        todayGuests+=v.guests||0;
      }

      if(!typeMap[v.type]) typeMap[v.type]=0;
      typeMap[v.type]+=v.amount;
    });

    document.getElementById("list").innerHTML=html;

    const avg=todayGuests>0?Math.round(todayRev/todayGuests):0;

    todayText=
`特富野餐廳日結
營業額:${todayRev}
客數:${todayGuests}
客單:${avg}`;

    document.getElementById("today").innerHTML=
    `營業額:${todayRev}<br>客數:${todayGuests}<br>客單:${avg}`;

    let ahtml="";
    for(let t in typeMap){
      ahtml+=`${t}：${typeMap[t]}<br>`;
    }

    document.getElementById("analysis").innerHTML=ahtml;
  });
}

function copyReport(){
  navigator.clipboard.writeText(todayText);
  alert("已複製");
}

render();
</script>

</body>
</html>
